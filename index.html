<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>AI 대학 입학사정관 시스템</title>
    <!-- 엑셀 파싱을 위한 SheetJS 라이브러리 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #2c3e50; }
        .form-section { background: #f9fbfb; padding: 20px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #e1e8ed; }
        .form-section h3 { margin-top: 0; color: #34495e; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        .form-group { margin-bottom: 15px; }
        label { font-weight: bold; display: block; margin-bottom: 8px; font-size: 14px; color: #555; }
        select, input[type="file"] { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #2980b9; color: white; border: none; font-size: 16px; font-weight: bold; border-radius: 5px; cursor: pointer; margin-top: 10px; }
        button:hover { background: #3498db; }
        button.secondary { background: #27ae60; }
        button.secondary:hover { background: #2ecc71; }
        #resultArea { margin-top: 30px; padding: 20px; background: #ecf0f1; border-radius: 5px; white-space: pre-wrap; line-height: 1.6; display: none;}
        .loading { text-align: center; color: #e67e22; font-weight: bold; display: none; margin-top: 15px;}
        .student-select-area { display: none; margin-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🏛️ AI 대학 입학사정관 평가 시스템</h1>
    
    <!-- 파일 업로드 영역 -->
    <div class="form-section">
        <h3>1. 학생부 데이터 업로드 (엑셀/CSV)</h3>
        <div class="form-group">
            <label for="fileProfile">인적사항 / 학년이력 파일</label>
            <input type="file" id="fileProfile" accept=".xlsx, .xls, .csv">
        </div>
        <div class="form-group">
            <label for="fileSubject">교과세특 파일</label>
            <input type="file" id="fileSubject" accept=".xlsx, .xls, .csv">
        </div>
        <div class="form-group">
            <label for="fileActivity">창체세특 파일</label>
            <input type="file" id="fileActivity" accept=".xlsx, .xls, .csv">
        </div>
        <div class="form-group">
            <label for="fileBehavior">행특세특 파일</label>
            <input type="file" id="fileBehavior" accept=".xlsx, .xls, .csv">
        </div>
        
        <button class="secondary" onclick="parseAndGroupFiles()">데이터 취합 및 학생 목록 불러오기</button>
        <div id="parseMessage" style="text-align:center; margin-top:10px; color:#27ae60; font-weight:bold;"></div>
    </div>

    <!-- 평가 설정 영역 -->
    <div class="form-section">
        <h3>2. 지원 대학 및 학생 선택</h3>
        <div class="form-group">
            <label for="university">대학 선택</label>
            <select id="university" onchange="updateCategory()"></select>
        </div>
        <div class="form-group">
            <label for="category">계열 선택</label>
            <select id="category" onchange="updateDepartment()"></select>
        </div>
        <div class="form-group">
            <label for="department">학과 선택</label>
            <select id="department"></select>
        </div>

        <div class="form-group student-select-area" id="studentSelectGroup">
            <label for="studentSelect">평가 대상 학생 선택</label>
            <select id="studentSelect">
                <option value=''>먼저 데이터를 취합해 주세요</option>
            </select>
        </div>
    </div>

    <button onclick="evaluateStudent()">선택 학생 입학사정관 AI 평가 시작</button>
    <div id="loading" class="loading">AI가 해당 학생의 데이터를 엄격하게 심층 분석 중입니다... (약 10~20초 소요)</div>
    
    <!-- 결과 출력 영역 -->
    <div id="resultArea"></div>
</div>

<script>
// 12개 대학 - 계열 - 학과 데이터베이스
const univData = {
    "서울대학교": { "인문/사회계열": ["국어국문학과", "정치외교학부", "경제학부", "경영대학"], "자연과학계열": ["수리과학부", "물리·천문학부", "생명과학부"], "공과/IT계열": ["기계공학부", "전기·정보공학부", "컴퓨터공학부", "화학생물공학부"], "의약계열": ["의예과", "약학계열", "수의예과"] },
    "연세대학교": { "인문/사회계열": ["영어영문학과", "행정학과", "경제학부", "경영학과"], "공과/IT계열": ["전기전자공학부", "신소재공학부", "인공지능학과", "시스템반도체공학과"], "의약계열": ["의예과", "치의예과", "약학과"] },
    "고려대학교": { "인문/사회계열": ["경영대학", "정치외교학과", "미디어학부"], "공과/IT계열": ["기계공학부", "신소재공학부", "데이터과학과", "스마트보안학부"], "자연/생명계열": ["생명과학부", "식품공학과"] },
    "서강대학교": { "인문/사회계열": ["인문학부", "경제학과", "경영학부", "지식융합미디어학부"], "공과/IT계열": ["전자공학과", "컴퓨터공학과", "인공지능학과", "시스템반도체공학과"], "자유전공": ["인문학기반자유전공", "AI기반자유전공"] },
    "한양대학교": { "공과/IT계열": ["미래자동차공학과", "데이터사이언스학부", "반도체공학과", "융합전자공학부"], "상경/정책계열": ["정책학과", "파이낸스경영학과", "경제금융학부"] },
    "중앙대학교": { "공과/IT계열": ["기계공학부", "전자전기공학부", "소프트웨어학부", "AI학과"], "의약계열": ["의학부", "약학부"], "인문/사회계열": ["공공인재학부", "미디어커뮤니케이션학부", "심리학과"] },
    "경희대학교": { "공과/IT계열": ["정보디스플레이학과", "반도체공학과", "소프트웨어융합학과"], "의약계열": ["의예과", "한의예과", "치의예과", "약학과"], "인문/사회계열": ["Hospitality경영학과", "글로벌커뮤니케이션학부"] },
    "한국외국어대학교": { "어문/지역학": ["ELLT학과", "아랍어과", "베트남어과"], "융합/통상계열": ["Language & AI 융합학부", "LD학부", "LT학부", "국제통상학과"] },
    "서울시립대학교": { "도시과학계열": ["도시행정학과", "도시사회학과", "도시공학과", "교통공학과", "환경공학부"], "공과/IT계열": ["전자전기컴퓨터공학부", "인공지능학과"] },
    "건국대학교": { "융합/생명계열": ["시스템생명공학과", "줄기세포재생공학과", "수의예과"], "공과/IT계열": ["스마트ICT융합공학과", "컴퓨터공학부"], "상경/부동산": ["부동산학과", "기술경영학과"] },
    "동국대학교": { "공과/IT계열": ["컴퓨터·AI학부", "시스템반도체학부", "정보통신공학과"], "법/사회/경찰": ["경찰행정학부", "법학과", "미디어커뮤니케이션학전공"], "자유전공": ["열린전공학부(인문)", "열린전공학부(자연)"] },
    "홍익대학교": { "자유전공": ["캠퍼스자율전공(자연·예능)", "캠퍼스자율전공(인문·예능)"], "공과/IT계열": ["디자인엔지니어링전공", "지능·로봇공학", "스마트도시·데이터사이언스전공"], "예술/건축": ["건축학부", "미술대학(디자인학부)"] }
};

let aggregatedStudentsData = {}; // 학생별로 취합된 데이터를 저장할 객체

window.onload = function() {
    const univSelect = document.getElementById("university");
    univSelect.innerHTML = "<option value=''>대학을 선택하세요</option>";
    for(let univ in univData) {
        univSelect.innerHTML += `<option value='${univ}'>${univ}</option>`;
    }
};

function updateCategory() {
    const univ = document.getElementById("university").value;
    const catSelect = document.getElementById("category");
    const deptSelect = document.getElementById("department");
    catSelect.innerHTML = "<option value=''>계열을 선택하세요</option>";
    deptSelect.innerHTML = "<option value=''>학과를 선택하세요</option>";
    if(univ && univData[univ]) {
        for(let cat in univData[univ]) {
            catSelect.innerHTML += `<option value='${cat}'>${cat}</option>`;
        }
    }
}

function updateDepartment() {
    const univ = document.getElementById("university").value;
    const cat = document.getElementById("category").value;
    const deptSelect = document.getElementById("department");
    deptSelect.innerHTML = "<option value=''>학과를 선택하세요</option>";
    if(univ && cat && univData[univ][cat]) {
        univData[univ][cat].forEach(dept => {
            deptSelect.innerHTML += `<option value='${dept}'>${dept}</option>`;
        });
    }
}

// 엑셀/CSV 파일을 JSON으로 파싱하는 유틸리티 함수
function readFileAsJSON(file) {
    return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = function(e) {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, {type: 'array'});
            const firstSheetName = workbook.SheetNames[0];
            const sheet = workbook.Sheets[firstSheetName];
            const json = XLSX.utils.sheet_to_json(sheet);
            resolve(json);
        };
        reader.onerror = reject;
        reader.readAsArrayBuffer(file);
    });
}

// 4개의 파일을 읽어서 학생 이름('성명')을 기준으로 묶어주는 함수
async function parseAndGroupFiles() {
    const fileInputs = [
        { id: 'fileProfile', key: '인적사항' },
        { id: 'fileSubject', key: '교과세특' },
        { id: 'fileActivity', key: '창체세특' },
        { id: 'fileBehavior', key: '행특세특' }
    ];

    aggregatedStudentsData = {};
    let hasData = false;

    document.getElementById("parseMessage").innerText = "데이터 취합 중입니다...";

    for (let inputInfo of fileInputs) {
        const fileElement = document.getElementById(inputInfo.id);
        if (fileElement.files.length > 0) {
            try {
                const data = await readFileAsJSON(fileElement.files[0]);
                hasData = true;
                
                data.forEach(row => {
                    // 키값 중 공백을 제거했을 때 '성명'인 컬럼 찾기 (예: '성 명', '성  명' 대응)
                    const nameKey = Object.keys(row).find(k => k.replace(/\s/g, '') === '성명');
                    
                    if (nameKey && row[nameKey]) {
                        const studentName = row[nameKey].trim();
                        // 해당 학생 데이터가 없으면 초기화
                        if (!aggregatedStudentsData[studentName]) {
                            aggregatedStudentsData[studentName] = { '인적사항': [], '교과세특': [], '창체세특': [], '행특세특': [] };
                        }
                        // 각 분류에 데이터 삽입
                        aggregatedStudentsData[studentName][inputInfo.key].push(row);
                    }
                });
            } catch (err) {
                console.error("파일 파싱 오류:", err);
                alert(`${inputInfo.key} 파일 처리 중 오류가 발생했습니다.`);
            }
        }
    }

    if (!hasData) {
        document.getElementById("parseMessage").innerText = "업로드된 파일이 없습니다. 최소 1개 이상의 파일을 선택해주세요.";
        return;
    }

    // 학생 선택 드롭다운 채우기
    const studentSelect = document.getElementById("studentSelect");
    studentSelect.innerHTML = "<option value=''>평가할 학생을 선택하세요</option>";
    
    const studentNames = Object.keys(aggregatedStudentsData).sort();
    studentNames.forEach(name => {
        studentSelect.innerHTML += `<option value='${name}'>${name}</option>`;
    });

    document.getElementById("studentSelectGroup").style.display = "block";
    document.getElementById("parseMessage").innerText = `✅ 총 ${studentNames.length}명의 학생 데이터가 성공적으로 취합되었습니다!`;
}

// 단일 학생에 대한 평가 실행
async function evaluateStudent() {
    const university = document.getElementById("university").value;
    const category = document.getElementById("category").value;
    const department = document.getElementById("department").value;
    const studentName = document.getElementById("studentSelect").value;

    if(!university || !category || !department) {
        alert("대학, 계열, 학과를 모두 선택해주세요.");
        return;
    }
    if(!studentName || !aggregatedStudentsData[studentName]) {
        alert("평가할 학생을 선택해주세요. (데이터 취합이 선행되어야 합니다)");
        return;
    }

    document.getElementById("loading").style.display = "block";
    document.getElementById("resultArea").style.display = "none";

    // 선택된 학생의 취합된 데이터만 백엔드로 전송
    const studentData = aggregatedStudentsData[studentName];

    try {
        const response = await fetch('/api/evaluate', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ university, category, department, studentName, studentData })
        });

        if (!response.ok) {
            throw new Error(`HTTP error! status: ${response.status}`);
        }

        const resultData = await response.json();
        
        document.getElementById("loading").style.display = "none";
        document.getElementById("resultArea").style.display = "block";
        document.getElementById("resultArea").innerText = resultData.result;

    } catch (error) {
        console.error(error);
        alert("서버 통신 중 오류가 발생했습니다.");
        document.getElementById("loading").style.display = "none";
    }
}
</script>

</body>
</html>
