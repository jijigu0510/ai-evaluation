<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>AI 대학 입학사정관 시스템</title>
    <!-- 엑셀 파싱을 위한 SheetJS 라이브러리 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #2c3e50; }
        .form-group { margin-bottom: 20px; }
        label { font-weight: bold; display: block; margin-bottom: 8px; }
        select, input[type="file"] { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; }
        button { width: 100%; padding: 15px; background: #2980b9; color: white; border: none; font-size: 16px; border-radius: 5px; cursor: pointer; }
        button:hover { background: #3498db; }
        #resultArea { margin-top: 30px; padding: 20px; background: #ecf0f1; border-radius: 5px; white-space: pre-wrap; line-height: 1.6; display: none;}
        .loading { text-align: center; color: #e67e22; font-weight: bold; display: none; margin-top: 15px;}
    </style>
</head>
<body>

<div class="container">
    <h1>🏛️ AI 대학 입학사정관 평가 시스템</h1>
    
    <!-- 드롭다운 영역 -->
    <div class="form-group">
        <label for="university">대학 선택</label>
        <select id="university" onchange="updateCategory()"></select>
    </div>
    <div class="form-group">
        <label for="category">계열 선택</label>
        <select id="category" onchange="updateDepartment()"></select>
    </div>
    <div class="form-group">
        <label for="department">학과 선택</label>
        <select id="department"></select>
    </div>

    <!-- 파일 업로드 영역 -->
    <div class="form-group">
        <label for="excelFile">학교생활기록부 엑셀 파일 업로드 ('인적', '교과세특', '창체', '행특' 시트 포함)</label>
        <input type="file" id="excelFile" accept=".xlsx, .xls">
    </div>

    <button onclick="evaluateStudent()">입학사정관 AI 평가 시작</button>
    <div id="loading" class="loading">AI가 학생부를 엄격하게 심층 분석 중입니다... (약 10~20초 소요)</div>
    
    <!-- 결과 출력 영역 -->
    <div id="resultArea"></div>
</div>

<script>
// 12개 대학 - 계열 - 학과 데이터베이스 (예시 확장 가능)
const univData = {

        "자연과학계열": ["수리과학부", "물리·천문학부", "생명과학부"],
        "공과/IT계열": ["기계공학부", "전기·정보공학부", "컴퓨터공학부", "화학생물공학부"],
        "의약계열": ["의예과", "약학계열", "수의예과"]
    },
    "연세대학교": {
        "인문/사회계열": ["영어영문학과", "행정학과", "경제학부", "경영학과"],
        "공과/IT계열": ["전기전자공학부", "신소재공학부", "인공지능학과", "시스템반도체공학과"],
        "의약계열": ["의예과", "치의예과", "약학과"]
    },
    "고려대학교": {
        "인문/사회계열": ["경영대학", "정치외교학과", "미디어학부"],
        "공과/IT계열": ["기계공학부", "신소재공학부", "데이터과학과", "스마트보안학부"],
        "자연/생명계열": ["생명과학부", "식품공학과"]
    },
    "서강대학교": {
        "인문/사회계열": ["인문학부", "경제학과", "경영학부", "지식융합미디어학부"],
        "공과/IT계열": ["전자공학과", "컴퓨터공학과", "인공지능학과", "시스템반도체공학과"],
        "자유전공": ["인문학기반자유전공", "AI기반자유전공"]
    },
    "한양대학교": {
        "공과/IT계열": ["미래자동차공학과", "데이터사이언스학부", "반도체공학과", "융합전자공학부"],
        "상경/정책계열": ["정책학과", "파이낸스경영학과", "경제금융학부"]
    },
    "중앙대학교": {
        "공과/IT계열": ["기계공학부", "전자전기공학부", "소프트웨어학부", "AI학과"],
        "의약계열": ["의학부", "약학부"],
        "인문/사회계열": ["공공인재학부", "미디어커뮤니케이션학부", "심리학과"]
    },
    "경희대학교": {
        "공과/IT계열": ["정보디스플레이학과", "반도체공학과", "소프트웨어융합학과"],
        "의약계열": ["의예과", "한의예과", "치의예과", "약학과"],
        "인문/사회계열": ["Hospitality경영학과", "글로벌커뮤니케이션학부"]
    },
    "한국외국어대학교": {
        "어문/지역학": ["ELLT학과", "아랍어과", "베트남어과"],
        "융합/통상계열": ["Language & AI 융합학부", "LD학부", "LT학부", "국제통상학과"]
    },
    "서울시립대학교": {
        "도시과학계열": ["도시행정학과", "도시사회학과", "도시공학과", "교통공학과", "환경공학부"],
        "공과/IT계열": ["전자전기컴퓨터공학부", "인공지능학과"]
    },
    "건국대학교": {
        "융합/생명계열": ["시스템생명공학과", "줄기세포재생공학과", "수의예과"],
        "공과/IT계열": ["스마트ICT융합공학과", "컴퓨터공학부"],
        "상경/부동산": ["부동산학과", "기술경영학과"]
    },
    "동국대학교": {
        "공과/IT계열": ["컴퓨터·AI학부", "시스템반도체학부", "정보통신공학과"],
        "법/사회/경찰": ["경찰행정학부", "법학과", "미디어커뮤니케이션학전공"],
        "자유전공": ["열린전공학부(인문)", "열린전공학부(자연)"]
    },
    "홍익대학교": {
        "자유전공": ["캠퍼스자율전공(자연·예능)", "캠퍼스자율전공(인문·예능)"],
        "공과/IT계열": ["디자인엔지니어링전공", "지능·로봇공학", "스마트도시·데이터사이언스전공"],
        "예술/건축": ["건축학부", "미술대학(디자인학부)"]
    }
};

// 드롭다운 초기화 로직
window.onload = function() {
    const univSelect = document.getElementById("university");
    univSelect.innerHTML = "<option value=''>대학을 선택하세요</option>";
    for(let univ in univData) {
        univSelect.innerHTML += `<option value='${univ}'>${univ}</option>`;
    }
};

function updateCategory() {
    const univ = document.getElementById("university").value;
    const catSelect = document.getElementById("category");
    const deptSelect = document.getElementById("department");
    catSelect.innerHTML = "<option value=''>계열을 선택하세요</option>";
    deptSelect.innerHTML = "<option value=''>학과를 선택하세요</option>";
    
    if(univ && univData[univ]) {
        for(let cat in univData[univ]) {
            catSelect.innerHTML += `<option value='${cat}'>${cat}</option>`;
        }
    }
}

function updateDepartment() {
    const univ = document.getElementById("university").value;
    const cat = document.getElementById("category").value;
    const deptSelect = document.getElementById("department");
    deptSelect.innerHTML = "<option value=''>학과를 선택하세요</option>";
    
    if(univ && cat && univData[univ][cat]) {
        univData[univ][cat].forEach(dept => {
            deptSelect.innerHTML += `<option value='${dept}'>${dept}</option>`;
        });
    }
}

// 엑셀 읽기 및 API 전송 로직
async function evaluateStudent() {
    const university = document.getElementById("university").value;
    const category = document.getElementById("category").value;
    const department = document.getElementById("department").value;
    const fileInput = document.getElementById("excelFile");

    if(!university || !category || !department || !fileInput.files || fileInput.files.length === 0) {
        alert("대학, 계열, 학과, 그리고 엑셀 파일을 모두 선택해주세요.");
        return;
    }

    document.getElementById("loading").style.display = "block";
    document.getElementById("resultArea").style.display = "none";

    const file = fileInput.files[0];
    const reader = new FileReader();

    reader.onload = async function(e) {
        const data = new Uint8Array(e.target.result);
        const workbook = XLSX.read(data, {type: 'array'});
        
        let studentData = {};

        // 업로드된 엑셀 시트별로 데이터를 JSON으로 파싱하여 모음
        workbook.SheetNames.forEach(sheetName => {
            const sheet = workbook.Sheets[sheetName];
            studentData[sheetName] = XLSX.utils.sheet_to_json(sheet);
        });

        // 백엔드 API로 데이터 전송
        try {
            // ★ 수정됨: localhost 하드코딩을 제거하고 상대경로로 변경했습니다.
            // 이렇게 하면 로컬 환경과 배포 환경 모두에서 알맞은 주소로 요청이 갑니다.
            const response = await fetch('/api/evaluate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ university, category, department, studentData })
            });

            if (!response.ok) {
                 throw new Error(`HTTP error! status: ${response.status}`);
            }

            const resultData = await response.json();
            
            document.getElementById("loading").style.display = "none";
            document.getElementById("resultArea").style.display = "block";
            // 마크다운 형태의 반환값을 표시
            document.getElementById("resultArea").innerText = resultData.result;

        } catch (error) {
            console.error(error);
            alert("서버 통신 중 오류가 발생했습니다.");
            document.getElementById("loading").style.display = "none";
        }
    };
    reader.readAsArrayBuffer(file);
}
</script>

</body>
</html>
